name: Build
on:
  - push
  - pull_request
  - workflow_dispatch
jobs:
  build:
    name: Build
    runs-on: windows-2022
    permissions:
      contents: write
    steps:
      - name: Configure git
        run: git config --global core.autocrlf false
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.5'
      - name: Set up msys2
        uses: msys2/setup-msys2@v2
        with:
          install: make tar zip unzip
          path-type: inherit
      - name: Build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: msys2 .github/workflows/build.sh
      - name: Archive
        uses: actions/upload-artifact@v7
        with:
          name: artifacts
          if-no-files-found: error
          path: |
            dist/
            !dist/*/*
